<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Filtr Yarat — Makler Bot</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>🏠 Yeni Filtr</h1>
      <p class="subtitle">Axtarış kriteriyalarını seçin</p>
    </header>

    <form id="filterForm" autocomplete="off">
      <!-- Section 1: Operation Type -->
      <section class="form-section" id="section-type">
        <h2 class="section-title">Əməliyyat növü <span class="required">*</span></h2>
        <div class="radio-group" id="typeGroup" data-key="type"></div>
      </section>

      <!-- Section 2: Property Type -->
      <section class="form-section" id="section-category">
        <h2 class="section-title">Kateqoriya <span class="required">*</span></h2>
        <div class="radio-group" id="categoryGroup" data-key="category"></div>
      </section>

      <!-- Section 3: Building Type -->
      <section class="form-section" id="section-building-type" style="display:none">
        <h2 class="section-title">Tikili növü</h2>
        <div class="radio-group" id="buildingTypeGroup" data-key="building_type"></div>
      </section>

      <!-- Section 4: Region (searchable) -->
      <section class="form-section" id="section-location">
        <h2 class="section-title">Şəhər / Rayon</h2>
        <div class="searchable-select multi" id="locationSelect">
          <input type="text" class="search-input" id="locationSearch" placeholder="Axtar... (məs. Yasamal)">
          <div class="dropdown-list" id="locationList"></div>
          <div class="selected-tags" id="locationTags"></div>
        </div>
      </section>

      <!-- Section 5: Metro (multi-select searchable) -->
      <section class="form-section" id="section-metro" style="display:none">
        <h2 class="section-title">Metro stansiyası</h2>
        <div class="searchable-select multi" id="metroSelect">
          <input type="text" class="search-input" id="metroSearch" placeholder="Axtar...">
          <div class="dropdown-list" id="metroList"></div>
          <div class="selected-tags" id="metroTags"></div>
        </div>
      </section>

      <!-- Section 6: Price Range -->
      <section class="form-section" id="section-price">
        <h2 class="section-title">Qiymət aralığı</h2>
        <div class="price-row">
          <div class="price-input-wrapper">
            <label for="priceMin">Minimum</label>
            <input type="number" id="priceMin" class="price-input" placeholder="0" min="0" inputmode="numeric">
          </div>
          <span class="price-separator">—</span>
          <div class="price-input-wrapper">
            <label for="priceMax">Maksimum</label>
            <input type="number" id="priceMax" class="price-input" placeholder="∞" min="0" inputmode="numeric">
          </div>
        </div>
        <div class="currency-chips" id="currencyChips">
          <button type="button" class="chip selected" data-value="AZN">AZN</button>
          <button type="button" class="chip" data-value="USD">USD</button>
          <button type="button" class="chip" data-value="EUR">EUR</button>
        </div>
      </section>

      <!-- Section 7: Area Range (m²) -->
      <section class="form-section" id="section-area" style="display:none">
        <h2 class="section-title">Sahə (m²)</h2>
        <div class="range-row">
          <div class="range-input-wrapper">
            <label for="areaMin">Minimum</label>
            <input type="number" id="areaMin" class="range-input" placeholder="0" min="0" inputmode="numeric">
          </div>
          <span class="range-separator">—</span>
          <div class="range-input-wrapper">
            <label for="areaMax">Maksimum</label>
            <input type="number" id="areaMax" class="range-input" placeholder="∞" min="0" inputmode="numeric">
          </div>
        </div>
      </section>

      <!-- Section 8: Land Area Range (sot) -->
      <section class="form-section" id="section-land-area" style="display:none">
        <h2 class="section-title">Torpaq sahəsi (sot)</h2>
        <div class="range-row">
          <div class="range-input-wrapper">
            <label for="landAreaMin">Minimum</label>
            <input type="number" id="landAreaMin" class="range-input" placeholder="0" min="0" inputmode="numeric">
          </div>
          <span class="range-separator">—</span>
          <div class="range-input-wrapper">
            <label for="landAreaMax">Maksimum</label>
            <input type="number" id="landAreaMax" class="range-input" placeholder="∞" min="0" inputmode="numeric">
          </div>
        </div>
      </section>

      <!-- Section 9: Rooms (multi-select chips) -->
      <section class="form-section" id="section-rooms">
        <h2 class="section-title">Otaq sayı</h2>
        <div class="chip-group multi" id="roomsGroup"></div>
      </section>

      <!-- Section 10: Floor Range -->
      <section class="form-section" id="section-floor" style="display:none">
        <h2 class="section-title">Mərtəbə</h2>
        <div class="range-row">
          <div class="range-input-wrapper">
            <label for="floorMin">Minimum</label>
            <input type="number" id="floorMin" class="range-input" placeholder="0" min="0" inputmode="numeric">
          </div>
          <span class="range-separator">—</span>
          <div class="range-input-wrapper">
            <label for="floorMax">Maksimum</label>
            <input type="number" id="floorMax" class="range-input" placeholder="∞" min="0" inputmode="numeric">
          </div>
        </div>
      </section>

      <!-- Section 11: Building Total Floors Range -->
      <section class="form-section" id="section-total-floor" style="display:none">
        <h2 class="section-title">Binanın mərtəbə sayı</h2>
        <div class="range-row">
          <div class="range-input-wrapper">
            <label for="totalFloorMin">Minimum</label>
            <input type="number" id="totalFloorMin" class="range-input" placeholder="0" min="0" inputmode="numeric">
          </div>
          <span class="range-separator">—</span>
          <div class="range-input-wrapper">
            <label for="totalFloorMax">Maksimum</label>
            <input type="number" id="totalFloorMax" class="range-input" placeholder="∞" min="0" inputmode="numeric">
          </div>
        </div>
      </section>

      <!-- Section 12: Exclude Last Floor -->
      <section class="form-section" id="section-exclude-last-floor" style="display:none">
        <label class="toggle-container">
          <span class="toggle-label">Axırıncı mərtəbə olmasın</span>
          <div class="toggle-switch">
            <input type="checkbox" id="excludeLastFloor">
            <span class="toggle-slider"></span>
          </div>
        </label>
      </section>

      <!-- Section 13: Repair Rate (multi-select chips) -->
      <section class="form-section" id="section-repair" style="display:none">
        <h2 class="section-title">Təmir vəziyyəti</h2>
        <div class="chip-group multi" id="repairGroup"></div>
      </section>

      <!-- Section 14: Owner Type -->
      <section class="form-section" id="section-owner" style="display:none">
        <h2 class="section-title">Sahibi</h2>
        <div class="radio-group" id="ownerGroup" data-key="owner_type"></div>
      </section>

      <!-- Section 15: Document Type (multi-select chips) -->
      <section class="form-section" id="section-document" style="display:none">
        <h2 class="section-title">Sənəd növü</h2>
        <div class="chip-group multi" id="documentGroup"></div>
      </section>

      <!-- Section 16: Landmark / Target (searchable multi-select) -->
      <section class="form-section" id="section-target" style="display:none">
        <h2 class="section-title">Nişangah</h2>
        <div class="searchable-select multi" id="targetSelect">
          <input type="text" class="search-input" id="targetSearch" placeholder="Axtar...">
          <div class="dropdown-list" id="targetList"></div>
          <div class="selected-tags" id="targetTags"></div>
        </div>
      </section>

      <!-- Section 17: Keyword Search -->
      <section class="form-section" id="section-keyword">
        <h2 class="section-title">Açar söz</h2>
        <input type="text" class="text-input" id="keywordInput" placeholder="Məs. kupçalı, təcili...">
      </section>

      <!-- Submit -->
      <div class="form-actions">
        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Yadda saxla ✓</span>
          <span class="btn-loader" style="display:none"></span>
        </button>
      </div>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
